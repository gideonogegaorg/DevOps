name: dotnet-deploy-ec2

on:
  workflow_call:
    inputs:
      csproj_publish:
        required: true
        type: string
      app_name:
        required: true
        type: string
      photos_app_name:
        required: false
        type: string
        default: ""
      dotnet_version:
        required: false
        type: string
        default: "10.0.x"
      generate_appsettings_script:
        required: false
        type: string
        default: "scripts/generate-appsettings.sh"
      generate_robots_script:
        required: false
        type: string
        default: "scripts/generate-robots.sh"
      configure_service_script:
        required: false
        type: string
        default: "scripts/configure-service.sh"
      install_runtime_script:
        required: false
        type: string
        default: "scripts/install-aspnetcore-runtime.sh"
      assembly_version:
        required: true
        type: string
      dll_version:
        required: true
        type: string
      setup_changed:
        required: false
        type: string
        default: "no"
        description: "Pass yes/no (not true/false) to avoid GitHub Actions masking in SSH scripts."
      deploy_path:
        required: true
        type: string
      full_hostname:
        required: true
        type: string
      port:
        required: true
        type: string
      service_name:
        required: true
        type: string
      cert_domain:
        required: true
        type: string
      is_production:
        required: false
        type: string
        default: "development"
        description: "Legacy bool (true/false) or production/development for configure-service.sh."
      photos_environment:
        required: false
        type: string
        default: ""
      require_postgres:
        required: false
        type: string
        default: "yes"
        description: "Pass yes/no (not true/false) for PG secret validation."
      deploy_env_lines:
        required: false
        type: string
        default: ""
      extra_deploy_dirs:
        required: false
        type: string
        default: "uploads"
    secrets:
      DEPLOY_DOMAIN:
        required: false
      PG_USER:
        required: false
      PG_PASS:
        required: false
      GH_USER:
        required: false
      GH_CLASSIC_PAT:
        required: false
      REMOTE_HOST:
        required: true
      SSH_PRIVATE_KEY:
        required: true
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      SEC_GROUP_ID:
        required: true
      GOOGLE_CLIENT_ID:
        required: false
      GOOGLE_CLIENT_SECRET:
        required: false
      OPENTELEMETRY_ENABLED:
        required: false
      OPENTELEMETRY_OTLPEXPORTENDPOINT:
        required: false
      OPENTELEMETRY_LOGGINGENDPOINT:
        required: false
      OPENTELEMETRY_HEADERS:
        required: false
      OPENTELEMETRY_METRICSENDPOINT:
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-${{ github.repository }}-${{ github.ref_name }}
      cancel-in-progress: false
    environment: ${{ github.ref_name }}
    env:
      DEPLOY_PATH: ${{ inputs.deploy_path }}
      FULL_HOSTNAME: ${{ inputs.full_hostname }}
      BRANCH: ${{ github.ref_name }}
      ASSEMBLY_VERSION: ${{ inputs.assembly_version }}
      DLL_VERSION: ${{ inputs.dll_version }}
      SETUP_CHANGED: ${{ (inputs.setup_changed == 'true' || inputs.setup_changed == 'yes') && 'yes' || 'no' }}
      PORT: ${{ inputs.port }}
      SERVICE_NAME: ${{ inputs.service_name }}
      CERT_DOMAIN: ${{ inputs.cert_domain }}
      POSTGRES_CONNECTION_STRING: "Host=localhost;Port=5432;Database=${{ inputs.service_name }};Username=${{ secrets.PG_USER }};Password=${{ secrets.PG_PASS }}"
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      OPENTELEMETRY_ENABLED: ${{ secrets.OPENTELEMETRY_ENABLED }}
      OPENTELEMETRY_OTLPEXPORTENDPOINT: ${{ secrets.OPENTELEMETRY_OTLPEXPORTENDPOINT }}
      OPENTELEMETRY_LOGGINGENDPOINT: ${{ secrets.OPENTELEMETRY_LOGGINGENDPOINT }}
      OPENTELEMETRY_HEADERS: ${{ secrets.OPENTELEMETRY_HEADERS }}
      OPENTELEMETRY_METRICSENDPOINT: ${{ secrets.OPENTELEMETRY_METRICSENDPOINT }}
      GITHUB_USERNAME: ${{ secrets.GH_USER }}
      GITHUB_PAT: ${{ secrets.GH_CLASSIC_PAT }}
      IS_PRODUCTION: ${{ inputs.is_production }}
      PRODUCTION_MODE: ${{ (inputs.is_production == 'true' || inputs.is_production == 'production') && 'production' || 'development' }}
      REQUIRE_POSTGRES: ${{ (inputs.require_postgres == 'true' || inputs.require_postgres == 'yes') && 'yes' || 'no' }}
      PG_USER: ${{ secrets.PG_USER }}
      PG_PASS: ${{ secrets.PG_PASS }}
      SEC_GROUP_ID: ${{ secrets.SEC_GROUP_ID }}
      PHOTOS_APP_NAME: ${{ inputs.photos_app_name != '' && inputs.photos_app_name || inputs.app_name }}
      PHOTOS_ENVIRONMENT: ${{ inputs.photos_environment }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: ${{ inputs.dotnet_version }}

      - name: Validate deploy config
        run: |
          if [ -z "$DEPLOY_PATH" ]; then
            echo "::error::DEPLOY_PATH is empty."
            exit 1
          fi
          if [[ "$DEPLOY_PATH" != /var/www/* ]]; then
            echo "::error::DEPLOY_PATH is invalid."
            exit 1
          fi
          if [ -z "$PORT" ]; then
            echo "::error::PORT is empty. Set the PORT variable on the GitHub environment (prod/dev) and pass it through a caller job with environment: set."
            exit 1
          fi
          if [ -z "$SERVICE_NAME" ]; then
            echo "::error::SERVICE_NAME is empty. Set the SERVICE_NAME variable on the GitHub environment (prod/dev) and pass it through a caller job with environment: set."
            exit 1
          fi
          if [ "$REQUIRE_POSTGRES" = "yes" ] && { [ -z "$PG_USER" ] || [ -z "$PG_PASS" ]; }; then
            echo "::error::Set PG_USER and PG_PASS organization secrets (gideonogegaorg → Settings → Secrets → Actions). Do not duplicate on repo or environment."
            exit 1
          fi

      - name: Generate appsettings.json for deploy
        if: inputs.generate_appsettings_script != ''
        env:
          SERILOG_LOG_PATH: ${{ env.DEPLOY_PATH }}/logs
          UPLOADS_PATH: ${{ env.DEPLOY_PATH }}/uploads
          PHOTOS_PROVIDER: S3
          S3_PHOTOS_BUCKET: ${{ vars.S3_PHOTOS_BUCKET }}
          PHOTOS_APP_NAME: ${{ env.PHOTOS_APP_NAME }}
          PHOTOS_ENVIRONMENT: ${{ env.PHOTOS_ENVIRONMENT }}
          PHOTOS_LOCAL_BASE_PATH: uploads/photos
          TELEMETRY_ENVIRONMENT_NAME: ${{ github.ref_name }}
          IS_PRODUCTION: ${{ env.IS_PRODUCTION }}
        run: bash "${{ inputs.generate_appsettings_script }}"

      - name: Generate robots.txt
        if: inputs.generate_robots_script != ''
        run: bash "${{ inputs.generate_robots_script }}"

      - name: Publish
        run: |
          dotnet publish "${{ inputs.csproj_publish }}" -c Release -o ./site \
            -p:Version=${{ env.ASSEMBLY_VERSION }} \
            -p:AssemblyVersion=${{ env.ASSEMBLY_VERSION }} \
            -p:FileVersion=${{ env.ASSEMBLY_VERSION }} \
            -p:InformationalVersion=${{ env.DLL_VERSION }}

      - name: Get GitHub Runner IP
        id: ip
        run: echo "ipv4=$(curl -s https://api.ipify.org)" >> $GITHUB_OUTPUT

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c # v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Authorize Runner IP in Security Group
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id "$SEC_GROUP_ID" \
            --protocol tcp --port 22 --cidr ${{ steps.ip.outputs.ipv4 }}/32

      - name: Copy site output to EC2
        uses: appleboy/scp-action@917f8b81dfc1ccd331fef9e2d61bdc6c8be94634 # v0.1.7
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "site/*,${{ inputs.configure_service_script }},${{ inputs.install_runtime_script }}"
          target: "/tmp/${{ inputs.app_name }}-deploy-${{ github.run_id }}"

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262 # v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            bash <<'DEPLOY_EOF'
            set -e
            DEPLOY_PATH='${{ env.DEPLOY_PATH }}'
            SETUP_CHANGED='${{ env.SETUP_CHANGED }}'
            FULL_HOSTNAME='${{ env.FULL_HOSTNAME }}'
            PORT='${{ env.PORT }}'
            SERVICE_NAME='${{ env.SERVICE_NAME }}'
            CERT_DOMAIN='${{ env.CERT_DOMAIN }}'
            PRODUCTION_MODE='${{ env.PRODUCTION_MODE }}'
            DEPLOY_ENV_LINES='${{ inputs.deploy_env_lines }}'
            EXTRA_DEPLOY_DIRS='${{ inputs.extra_deploy_dirs }}'
            STAGING="/tmp/${{ inputs.app_name }}-deploy-${{ github.run_id }}"
            CONFIG_SCRIPT="${{ inputs.configure_service_script }}"
            RUNTIME_SCRIPT="${{ inputs.install_runtime_script }}"
            trap 'rm -rf "$STAGING"' EXIT
            echo "[Deploy] Ensuring ASP.NET Core Runtime 10..."
            sudo bash "$STAGING/$RUNTIME_SCRIPT"
            echo "[Deploy] Ensuring directory..."
            sudo mkdir -p "$DEPLOY_PATH/site" "$DEPLOY_PATH/logs"
            if [ -n "$EXTRA_DEPLOY_DIRS" ]; then
              IFS=',' read -ra DIRS <<< "$EXTRA_DEPLOY_DIRS"
              for d in "${DIRS[@]}"; do
                trimmed="${d// /}"
                if [ -n "$trimmed" ]; then
                  sudo mkdir -p "$DEPLOY_PATH/$trimmed"
                fi
              done
            fi
            sudo chown -R ubuntu:www-data "$DEPLOY_PATH"
            SERVICE_FILE="/etc/systemd/system/${SERVICE_NAME}.service"
            NEEDS_SETUP=no
            if [ "$SETUP_CHANGED" != "no" ] || [ ! -f "$SERVICE_FILE" ]; then
              NEEDS_SETUP=yes
            else
              DEPLOYED_DLL=""
              for dll in "$STAGING/site/"*.Web.dll; do
                [ -f "$dll" ] || continue
                DEPLOYED_DLL="$(basename "$dll")"
                break
              done
              if [ -n "$DEPLOYED_DLL" ] && ! grep -qF "$DEPLOYED_DLL" "$SERVICE_FILE"; then
                echo "[Deploy] Systemd unit does not reference $DEPLOYED_DLL; re-running configure-service.sh..."
                NEEDS_SETUP=yes
              fi
            fi
            if [ "$NEEDS_SETUP" = "yes" ]; then
              echo "[Deploy] Running configure-service.sh..."
              sudo bash "$STAGING/$CONFIG_SCRIPT" "$FULL_HOSTNAME" "$PORT" "$SERVICE_NAME" "$CERT_DOMAIN" "$PRODUCTION_MODE"
            fi
            if [ -n "$DEPLOY_ENV_LINES" ]; then
              printf '%s\n' "$DEPLOY_ENV_LINES" > "$DEPLOY_PATH/.env"
              chmod 600 "$DEPLOY_PATH/.env"
            fi
            echo "[Deploy] Copying site output..."
            if [ ! -d "$STAGING/site" ]; then
              echo "::error::Missing staging site dir: $STAGING/site"
              ls -la "$STAGING" || true
              exit 1
            fi
            cp -r "$STAGING/site/." "$DEPLOY_PATH/site/"
            sudo chown -R ubuntu:www-data "$DEPLOY_PATH"
            echo "[Deploy] Restarting service..."
            sudo systemctl restart "$SERVICE_NAME"
            if ! systemctl is-active --quiet "$SERVICE_NAME"; then
              echo "::error::Service $SERVICE_NAME failed to start after deploy."
              sudo journalctl -u "$SERVICE_NAME" -n 80 --no-pager
              exit 1
            fi
            echo "[Deploy] Waiting for local health check on port $PORT..."
            HEALTH_OK=no
            for i in $(seq 1 24); do
              if curl -sf "http://127.0.0.1:${PORT}/health" > /dev/null; then
                echo "[Deploy] Local health check passed (+$(( (i - 1) * 5 ))s)."
                HEALTH_OK=yes
                break
              fi
              sleep 5
            done
            if [ "$HEALTH_OK" != "yes" ]; then
              echo "::error::Local health check failed after 115s on http://127.0.0.1:${PORT}/health"
              sudo journalctl -u "$SERVICE_NAME" -n 80 --no-pager
              exit 1
            fi
            echo "[Deploy] Waiting for local homepage check on port $PORT..."
            HOME_OK=no
            for i in $(seq 1 12); do
              HTTP=$(curl -s -o /dev/null -w '%{http_code}' "http://127.0.0.1:${PORT}/" || echo "000")
              if [ "$HTTP" = "200" ]; then
                echo "[Deploy] Local homepage check passed (+$(( (i - 1) * 5 ))s)."
                HOME_OK=yes
                break
              fi
              sleep 5
            done
            if [ "$HOME_OK" != "yes" ]; then
              echo "::error::Local homepage check failed after 55s (expected HTTP 200 from http://127.0.0.1:${PORT}/)."
              sudo journalctl -u "$SERVICE_NAME" -n 80 --no-pager
              exit 1
            fi
            DEPLOY_EOF

      - name: Verify public site health
        run: |
          HEALTH_URL="https://${FULL_HOSTNAME}/health"
          HOME_URL="https://${FULL_HOSTNAME}/"
          echo "Polling $HEALTH_URL and $HOME_URL every 5s for up to 30s..."
          START=$(date +%s)
          while true; do
            ELAPSED=$(( $(date +%s) - START ))
            HEALTH_HTTP=$(curl -s -o /dev/null -w '%{http_code}' "$HEALTH_URL" || echo "000")
            HOME_HTTP=$(curl -s -o /dev/null -w '%{http_code}' "$HOME_URL" || echo "000")
            echo "Health (+${ELAPSED}s) -> HTTP $HEALTH_HTTP; Home (+${ELAPSED}s) -> HTTP $HOME_HTTP"
            if [ "$HEALTH_HTTP" = "200" ] && [ "$HOME_HTTP" = "200" ]; then
              echo "Health and homepage checks passed."
              exit 0
            fi
            if [ "$ELAPSED" -ge 30 ]; then
              echo "::error::Public checks failed after 30s (expected HTTP 200 from $HEALTH_URL and $HOME_URL)."
              exit 1
            fi
            sleep 5
          done

      - name: Revoke Runner IP (Cleanup)
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id "$SEC_GROUP_ID" \
            --protocol tcp --port 22 --cidr ${{ steps.ip.outputs.ipv4 }}/32
