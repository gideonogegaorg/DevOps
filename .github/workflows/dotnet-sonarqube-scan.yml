name: dotnet-sonarqube-scan

on:
  workflow_call:
    inputs:
      solution_file:
        required: true
        type: string
      dotnet_version:
        required: false
        type: string
        default: "10.0.x"
      generate_appsettings_script:
        required: false
        type: string
        default: ""
      production_branch:
        required: false
        type: string
        default: prod
      development_branch:
        required: false
        type: string
        default: dev
      sonar_main_branch:
        required: false
        type: string
        default: ""
      sonar_skip_branches:
        required: false
        type: string
        default: ""
      sonar_project_key:
        required: false
        type: string
        default: ""
      sonar_exclusions:
        required: false
        type: string
        default: "**/Migrations/**,**/AppDbContextFactory.cs,**/wwwroot/lib/**,**/wwwroot/js/**,**/.github/**,**/bin/**,**/obj/**,**/coverage/**"
      sonar_coverage_exclusions:
        required: false
        type: string
        default: "**/*.cshtml,**/*.cshtml.css,**/Views/**,**/wwwroot/**"
      sonar_cpd_exclusions:
        required: false
        type: string
        default: "**/tst/**"
      coverlet_runsettings:
        required: false
        type: string
        default: coverlet.runsettings
      playwright_install_glob:
        required: false
        type: string
        default: ""
      setup_paths_filter:
        required: false
        type: string
        default: ""
      postgres_image:
        required: false
        type: string
        default: postgres:16-alpine
      postgres_user:
        required: false
        type: string
        default: family
      postgres_password:
        required: false
        type: string
        default: family
      postgres_db:
        required: false
        type: string
        default: family
      use_gmo_feed:
        required: false
        type: string
        default: "true"
      postgres_enabled:
        required: false
        type: string
        default: "true"
    secrets:
      GH_USER:
        required: false
      GH_CLASSIC_PAT:
        required: false
      SONAR_TOKEN:
        required: false
    outputs:
      assembly_version:
        value: ${{ jobs.build.outputs.assembly_version || jobs.build_no_postgres.outputs.assembly_version }}
      dll_version:
        value: ${{ jobs.build.outputs.dll_version || jobs.build_no_postgres.outputs.dll_version }}
      setup_changed:
        value: ${{ jobs.build.outputs.setup_changed || jobs.build_no_postgres.outputs.setup_changed }}

jobs:
  build:
    if: inputs.postgres_enabled == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      GITHUB_USERNAME: ${{ secrets.GH_USER }}
      GITHUB_PAT: ${{ secrets.GH_CLASSIC_PAT }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      PRODUCTION_BRANCH: ${{ inputs.production_branch }}
      DEVELOPMENT_BRANCH: ${{ inputs.development_branch }}
      SONAR_MAIN_BRANCH: ${{ inputs.sonar_main_branch != '' && inputs.sonar_main_branch || inputs.production_branch }}
    outputs:
      assembly_version: ${{ steps.setversion.outputs.assembly_version }}
      dll_version: ${{ steps.setversion.outputs.dll_version }}
      setup_changed: ${{ steps.filter.outputs.setup }}
    services:
      postgres:
        image: ${{ inputs.postgres_image }}
        env:
          POSTGRES_USER: ${{ inputs.postgres_user }}
          POSTGRES_PASSWORD: ${{ inputs.postgres_password }}
          POSTGRES_DB: ${{ inputs.postgres_db }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ${{ inputs.postgres_user }} -d ${{ inputs.postgres_db }}"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      # Always available for callers that need a broker (e.g. SpotifySmartPlaylists). Harmless if unused.
      rabbitmq:
        image: rabbitmq:3-alpine
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050 # v3
        if: github.event_name == 'push' && inputs.setup_paths_filter != ''
        id: filter
        with:
          filters: |
            setup:
              - '${{ inputs.setup_paths_filter }}'

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: ${{ inputs.dotnet_version }}

      - name: Check NuGet auth for GMO feed
        if: inputs.use_gmo_feed == 'true'
        run: |
          if [ -z "$GITHUB_PAT" ]; then
            echo "::error::GITHUB_PAT is empty. Add repository secret GH_CLASSIC_PAT (with read:packages)."
            exit 1
          fi

      - name: Configure NuGet auth for GMO feed
        if: inputs.use_gmo_feed == 'true'
        run: dotnet nuget update source GMO --username "$GITHUB_USERNAME" --password "$GITHUB_PAT" --store-password-in-clear-text

      - name: Generate appsettings.json for build
        if: inputs.generate_appsettings_script != ''
        run: bash "${{ inputs.generate_appsettings_script }}"

      - name: Set version
        id: setversion
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          YEAR=$(date +%Y)
          MONTH=$(date +%m)
          DAY=$(date +%d)
          HHMM=$(date +%H%M)
          ASSEMBLY_VERSION="$YEAR.$MONTH.$DAY.$HHMM"
          if [ "$REF_NAME" = "$DEVELOPMENT_BRANCH" ]; then
            DLL_VERSION="DEV-$YEAR$MONTH$DAY-$HHMM"
          else
            DLL_VERSION="$YEAR$MONTH$DAY-$HHMM"
          fi
          echo "ASSEMBLY_VERSION=$ASSEMBLY_VERSION" >> $GITHUB_ENV
          echo "DLL_VERSION=$DLL_VERSION" >> $GITHUB_ENV
          echo "assembly_version=$ASSEMBLY_VERSION" >> $GITHUB_OUTPUT
          echo "dll_version=$DLL_VERSION" >> $GITHUB_OUTPUT

      - name: Install SonarScanner
        if: >-
          env.SONAR_TOKEN != '' &&
          (github.event_name == 'pull_request' ||
           inputs.sonar_skip_branches == '' ||
           !contains(format(',{0},', inputs.sonar_skip_branches), format(',{0},', github.ref_name)))
        run: dotnet tool install --global dotnet-sonarscanner

      - name: SonarCloud begin
        if: >-
          env.SONAR_TOKEN != '' &&
          (github.event_name == 'pull_request' ||
           inputs.sonar_skip_branches == '' ||
           !contains(format(',{0},', inputs.sonar_skip_branches), format(',{0},', github.ref_name)))
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_EVENT_NAME: ${{ github.event_name }}
          SONAR_PR_KEY: ${{ github.event.pull_request.number }}
          SONAR_PR_BRANCH: ${{ github.head_ref }}
          SONAR_PR_BASE: ${{ github.base_ref }}
          SONAR_BRANCH: ${{ github.ref_name }}
          SONAR_PROJECT_VERSION: ${{ env.DLL_VERSION }}
          SONAR_ORGANIZATION: ${{ github.repository_owner }}
          SONAR_PROJECT_KEY: ${{ inputs.sonar_project_key != '' && inputs.sonar_project_key || format('{0}_{1}', github.repository_owner, github.event.repository.name) }}
          SONAR_PROJECT_NAME: ${{ github.event.repository.name }}
        run: |
          EXCLUSIONS="${{ inputs.sonar_exclusions }}"
          COVERAGE_EXCLUSIONS="${{ inputs.sonar_coverage_exclusions }}"
          QG_WAIT="true"
          if [ "$SONAR_EVENT_NAME" = "pull_request" ]; then
            # PR decoration uses SonarCloud's GitHub check; scanner QG wait often fails on short-lived branches.
            QG_WAIT="false"
          fi
          if [ -z "$SONAR_TOKEN" ]; then
            echo "::error::SONAR_TOKEN is empty. Add the organization secret SONAR_TOKEN with Analyze and Quality Gate read permissions."
            exit 1
          fi
          PROJECT_JSON="$(curl -sf -u "${SONAR_TOKEN}:" \
            "https://sonarcloud.io/api/project_branches/list?project=${SONAR_PROJECT_KEY}" || true)"
          if ! echo "$PROJECT_JSON" | grep -q "\"name\""; then
            echo "::error::SonarCloud project '${SONAR_PROJECT_KEY}' was not found. Import the repository at https://sonarcloud.io/organizations/${SONAR_ORGANIZATION}/projects or run the sonarcloud-setup workflow."
            exit 1
          fi
          if [ "$SONAR_EVENT_NAME" = "push" ] && [ "$SONAR_BRANCH" = "$SONAR_MAIN_BRANCH" ]; then
            BRANCHES_JSON="$(curl -sf -u "${SONAR_TOKEN}:" \
              "https://sonarcloud.io/api/project_branches/list?project=${SONAR_PROJECT_KEY}")"
            MAIN_NAME="$(echo "$BRANCHES_JSON" | jq -r '.branches[] | select(.isMain) | .name' | head -n 1)"
            if [ -z "$MAIN_NAME" ]; then
              echo "::error::Could not determine SonarCloud main branch for ${SONAR_PROJECT_KEY}."
              exit 1
            fi
            if [ "$MAIN_NAME" = "$SONAR_MAIN_BRANCH" ]; then
              echo "SonarCloud main branch already ${SONAR_MAIN_BRANCH}"
            else
              if echo "$BRANCHES_JSON" | jq -e --arg branch "$SONAR_MAIN_BRANCH" '.branches[] | select(.name == $branch and (.isMain | not))' >/dev/null; then
                echo "Deleting existing non-main branch ${SONAR_MAIN_BRANCH} before rename..."
                curl -sf -X POST -u "${SONAR_TOKEN}:" \
                  "https://sonarcloud.io/api/project_branches/delete" \
                  -d "project=${SONAR_PROJECT_KEY}" \
                  -d "branch=${SONAR_MAIN_BRANCH}"
              fi
              RENAME_HTTP="$(curl -s -o /tmp/sonar-rename.json -w '%{http_code}' -X POST -u "${SONAR_TOKEN}:" \
                "https://sonarcloud.io/api/project_branches/rename" \
                -d "project=${SONAR_PROJECT_KEY}" \
                -d "name=${SONAR_MAIN_BRANCH}")"
              if [ "$RENAME_HTTP" != "200" ] && [ "$RENAME_HTTP" != "204" ]; then
                cat /tmp/sonar-rename.json || true
                echo "::error::Could not rename SonarCloud main branch from '${MAIN_NAME}' to ${SONAR_MAIN_BRANCH}. Ensure SONAR_TOKEN has Administer Project on ${SONAR_PROJECT_KEY}."
                exit 1
              fi
              echo "Renamed SonarCloud main branch from '${MAIN_NAME}' to ${SONAR_MAIN_BRANCH}"
            fi
          fi
          if [ "$QG_WAIT" = "true" ] && [ "$SONAR_EVENT_NAME" = "push" ]; then
            qg_http="$(curl -s -o /tmp/sonar-qg-preflight.json -w '%{http_code}' -u "${SONAR_TOKEN}:" \
              "https://sonarcloud.io/api/qualitygates/project_status?projectKey=${SONAR_PROJECT_KEY}&branch=${SONAR_BRANCH}")"
            if [ "$qg_http" != "200" ]; then
              cat /tmp/sonar-qg-preflight.json || true
              echo "::error::Cannot read SonarCloud quality gate for branch '${SONAR_BRANCH}' (HTTP ${qg_http}). Verify SONAR_TOKEN permissions and run the sonarcloud-setup workflow."
              exit 1
            fi
            echo "SonarCloud quality gate API reachable for branch '${SONAR_BRANCH}'."
          fi
          begin_args=(
            "/k:${SONAR_PROJECT_KEY}"
            "/o:${SONAR_ORGANIZATION}"
            "/n:${SONAR_PROJECT_NAME}"
            "/v:$SONAR_PROJECT_VERSION"
            "/d:sonar.projectBaseDir=$GITHUB_WORKSPACE"
            "/d:sonar.token=$SONAR_TOKEN"
            "/d:sonar.host.url=https://sonarcloud.io"
            "/d:sonar.qualitygate.wait=$QG_WAIT"
            "/d:sonar.cs.opencover.reportsPaths=coverage/**/coverage.opencover.xml,**/TestResults/**/coverage.opencover.xml"
            "/d:sonar.exclusions=$EXCLUSIONS"
            "/d:sonar.coverage.exclusions=$COVERAGE_EXCLUSIONS"
            "/d:sonar.cpd.exclusions=${{ inputs.sonar_cpd_exclusions }}"
          )
          if [ "$SONAR_EVENT_NAME" = "pull_request" ]; then
            begin_args+=(
              "/d:sonar.pullrequest.key=$SONAR_PR_KEY"
              "/d:sonar.pullrequest.branch=$SONAR_PR_BRANCH"
              "/d:sonar.pullrequest.base=$SONAR_PR_BASE"
            )
          else
            begin_args+=("/d:sonar.branch.name=$SONAR_BRANCH")
          fi
          dotnet sonarscanner begin "${begin_args[@]}"

      - name: Build
        run: |
          dotnet build "${{ inputs.solution_file }}" --verbosity normal \
            -p:Version=${{ env.ASSEMBLY_VERSION }} \
            -p:AssemblyVersion=${{ env.ASSEMBLY_VERSION }} \
            -p:FileVersion=${{ env.ASSEMBLY_VERSION }} \
            -p:InformationalVersion=${{ env.DLL_VERSION }}

      - name: Install Playwright Browsers
        if: inputs.playwright_install_glob != ''
        run: pwsh ${{ inputs.playwright_install_glob }} install --with-deps chromium

      - name: Create working directory
        run: mkdir -p working

      - name: Test (all projects)
        env:
          POSTGRES_CONNECTION_STRING: Host=localhost;Port=5432;Database=${{ inputs.postgres_db }};Username=${{ inputs.postgres_user }};Password=${{ inputs.postgres_password }}
        run: |
          mkdir -p coverage
          dotnet test "${{ inputs.solution_file }}" --no-build --verbosity normal \
            --settings "$GITHUB_WORKSPACE/${{ inputs.coverlet_runsettings }}" \
            --collect:"XPlat Code Coverage;Format=opencover" \
            --results-directory "$GITHUB_WORKSPACE/coverage"

      - name: SonarCloud end
        if: >-
          env.SONAR_TOKEN != '' &&
          (github.event_name == 'pull_request' ||
           inputs.sonar_skip_branches == '' ||
           !contains(format(',{0},', inputs.sonar_skip_branches), format(',{0},', github.ref_name)))
        run: dotnet sonarscanner end /d:sonar.token=$SONAR_TOKEN

      - name: Upload coverage results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-results
          path: |
            coverage/**/coverage.opencover.xml
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload UI test artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ui-test-artifacts
          path: working/
          retention-days: 30
          if-no-files-found: ignore

  build_no_postgres:
    if: inputs.postgres_enabled != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      GITHUB_USERNAME: ${{ secrets.GH_USER }}
      GITHUB_PAT: ${{ secrets.GH_CLASSIC_PAT }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      PRODUCTION_BRANCH: ${{ inputs.production_branch }}
      DEVELOPMENT_BRANCH: ${{ inputs.development_branch }}
      SONAR_MAIN_BRANCH: ${{ inputs.sonar_main_branch != '' && inputs.sonar_main_branch || inputs.production_branch }}
    outputs:
      assembly_version: ${{ steps.setversion.outputs.assembly_version }}
      dll_version: ${{ steps.setversion.outputs.dll_version }}
      setup_changed: ${{ steps.filter.outputs.setup }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050 # v3
        if: github.event_name == 'push' && inputs.setup_paths_filter != ''
        id: filter
        with:
          filters: |
            setup:
              - '${{ inputs.setup_paths_filter }}'

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: ${{ inputs.dotnet_version }}

      - name: Check NuGet auth for GMO feed
        if: inputs.use_gmo_feed == 'true'
        run: |
          if [ -z "$GITHUB_PAT" ]; then
            echo "::error::GITHUB_PAT is empty. Add repository secret GH_CLASSIC_PAT (with read:packages)."
            exit 1
          fi

      - name: Configure NuGet auth for GMO feed
        if: inputs.use_gmo_feed == 'true'
        run: dotnet nuget update source GMO --username "$GITHUB_USERNAME" --password "$GITHUB_PAT" --store-password-in-clear-text

      - name: Generate appsettings.json for build
        if: inputs.generate_appsettings_script != ''
        run: bash "${{ inputs.generate_appsettings_script }}"

      - name: Set version
        id: setversion
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          YEAR=$(date +%Y)
          MONTH=$(date +%m)
          DAY=$(date +%d)
          HHMM=$(date +%H%M)
          ASSEMBLY_VERSION="$YEAR.$MONTH.$DAY.$HHMM"
          if [ "$REF_NAME" = "$DEVELOPMENT_BRANCH" ]; then
            DLL_VERSION="DEV-$YEAR$MONTH$DAY-$HHMM"
          else
            DLL_VERSION="$YEAR$MONTH$DAY-$HHMM"
          fi
          echo "ASSEMBLY_VERSION=$ASSEMBLY_VERSION" >> $GITHUB_ENV
          echo "DLL_VERSION=$DLL_VERSION" >> $GITHUB_ENV
          echo "assembly_version=$ASSEMBLY_VERSION" >> $GITHUB_OUTPUT
          echo "dll_version=$DLL_VERSION" >> $GITHUB_OUTPUT

      - name: Install SonarScanner
