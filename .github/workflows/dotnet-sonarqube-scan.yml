          SONAR_EVENT_NAME: ${{ github.event_name }}
          SONAR_PR_KEY: ${{ github.event.pull_request.number }}
          SONAR_PR_BRANCH: ${{ github.head_ref }}
          SONAR_PR_BASE: ${{ github.base_ref }}
          SONAR_BRANCH: ${{ github.ref_name }}
          SONAR_PROJECT_VERSION: ${{ env.DLL_VERSION }}
          SONAR_ORGANIZATION: ${{ github.repository_owner }}
          SONAR_PROJECT_KEY: ${{ inputs.sonar_project_key != '' && inputs.sonar_project_key || format('{0}_{1}', github.repository_owner, github.event.repository.name) }}
          SONAR_PROJECT_NAME: ${{ github.event.repository.name }}
        run: |
