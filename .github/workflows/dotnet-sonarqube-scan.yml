            --settings "$GITHUB_WORKSPACE/${{ inputs.coverlet_runsettings }}" \
            --collect:"XPlat Code Coverage;Format=opencover" \
            --results-directory "$GITHUB_WORKSPACE/coverage"

      - name: SonarCloud end
        if: >-
          env.SONAR_TOKEN != '' &&
          (github.event_name == 'pull_request' ||
           inputs.sonar_skip_branches == '' ||
           !contains(format(',{0},', inputs.sonar_skip_branches), format(',{0},', github.ref_name)))
        run: dotnet sonarscanner end /d:sonar.token=$SONAR_TOKEN

      - name: Upload coverage results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-results
          path: |
            coverage/**/coverage.opencover.xml
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload UI test artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ui-test-artifacts
          path: working/
          retention-days: 30
          if-no-files-found: ignore
